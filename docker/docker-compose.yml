services:
  postgres:
    container_name: postgres_dimgit9
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - shared_net

  mongo:
    container_name: mongo_dimgit9
    image: mongo:6
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - 27018:27017
    volumes:
      - mongo_data:/data/db
    networks:
      - shared_net

  redis:
    container_name: redis_dimgit9
    image: redis:8.0-alpine
    restart: always
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    ports:
      - 6380:6379
    volumes:
      - redis_data:/data
    networks:
      - shared_net

  rabbitmq:
    container_name: rabbitmq_dimgit9
    image: rabbitmq:3-management
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - shared_net

  postgres-exporter:
    container_name: postgres-exporter_dimgit9
    image: prometheuscommunity/postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME='postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable'
    ports:
      - 9187:9187
    networks:
      - shared_net
    depends_on:
      - postgres

  redis-exporter:
    container_name: redis-exporter_dimgit9
    image: oliver006/redis_exporter
    restart: always
    command: -redis.addr=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - 9121:9121
    networks:
      - shared_net
    depends_on:
      - redis

  rabbitmq-exporter:
    container_name: rabbitmq-exporter_dimgit9
    image: kbudde/rabbitmq-exporter
    restart: always
    environment:
      - RABBIT_URL='http://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:15672'
    ports:
      - 9419:9419
    networks:
      - shared_net
    depends_on:
      - rabbitmq

  node-exporter:
    container_name: node-exporter_dimgit9
    image: prom/node-exporter
    restart: always
    ports:
      - 9100:9100
    networks:
      - shared_net

  prometheus:
    container_name: prometheus_dimgit9
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    networks:
      - shared_net

  grafana:
    container_name: grafana_dimgit9
    image: grafana/grafana:10.2.3
    restart: unless-stopped
    ports:
      - '3002:3000'
    volumes:
      - 'grafana-storage:/var/lib/grafana'
    depends_on:
      - prometheus
    networks:
      - shared_net

  jaeger:
    container_name: jaeger_dimgit9
    image: jaegertracing/all-in-one:1.47
    restart: unless-stopped
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    networks:
      - shared_net

  loki:
    container_name: loki_dimgit9
    image: grafana/loki:2.9.1
    restart: unless-stopped
    volumes:
      - ./loki-config.yml:/etc/loki/config.yaml
      - ./loki-data:/loki
      - ./loki-wal:/wal
    command: -config.file=/etc/loki/config.yaml
    ports:
      - '3100:3100'
    networks:
      - shared_net

  promtail:
    container_name: promtail_dimgit9
    image: grafana/promtail:2.9.1
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yaml
      - ../logs:/var/log/services
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - shared_net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  grafana-storage:

networks:
  shared_net:
    external: true